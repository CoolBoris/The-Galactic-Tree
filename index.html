<!doctype html>

<head>
	<link rel="stylesheet" type="text/css" href="css/system-style.css" />
	<link rel="stylesheet" type="text/css" href="css/bars.css" />
	<link rel="stylesheet" type="text/css" href="css/components.css" />
	<link rel="stylesheet" type="text/css" href="css/general-style.css" />
	<link rel="stylesheet" type="text/css" href="css/misc.css" />
	<link rel="stylesheet" type="text/css" href="css/other-tabs.css" />
	<link rel="stylesheet" type="text/css" href="css/popup.css" />
	<link rel="stylesheet" type="text/css" href="css/tree-node.css" />
	<link rel="icon" type="image/x-icon" href="resources/coolboris.png" />

	<script src="https://unpkg.com/vue@2.7.16/dist/vue.min.js"></script>
	<script src="js/technical/break_eternity.js"></script>
	<script src="js/technical/layerSupport.js"></script>

	<script src="js/mod.js"></script>
	<script src="js/technical/loader.js"></script>

	<script src="js/technical/temp.js"></script>
	<script src="js/technical/displays.js"></script>

	<script src="js/technical/game.js"></script>
	<script src="js/technical/utils.js"></script>
	<script src="js/technical/easyAccess.js"></script>
	<script src="js/technical/systemComponents.js"></script>
	<script src="js/technical/components.js"></script>
	<script src="js/technical/canvas.js"></script>
	<script src="js/technical/particleSystem.js"></script>
	<script src="js/technical/NumberFormating.js"></script>
	<script src="js/technical/options.js"></script>
	<script src="js/technical/save.js"></script>
	<script src="js/technical/themes.js"></script>

	<style>
		#loadingScreen {
			position: fixed;
			inset: 0;
			width: 100vw;
			height: 100vh;
			background: #0a0a0a;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 20px;
			z-index: 999999999999999999999999999999999999999999999999999999999999999999999999999999999;
			pointer-events: all;
			font-family: monospace;
			color: white;
		}
		#loadingLogo {
			width: 200px;
			height: 200px;
			border-radius: 5%;
		}
		#loadingScreen h1 {
			font-size: 2.5em;
			margin: 0;
		}
		.spinner {
			width: 75px;
			height: 75px;
			border: 7.5px solid #333;
			border-top-color: rgb(255, 255, 255);
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
		}
		@keyframes spin {
			to {
				transform: rotate(360deg);
			}
		}
		.loading-buttons {
			display: flex;
			gap: 12px;
			margin-top: 10px;
		}
		.loading-btn {
			padding: 8px 16px;
			background: #1a1a1a;
			color: white;
			border: 1px solid #444;
			border-radius: 6px;
			cursor: pointer;
			font-family: monospace;
			font-size: 1.5em;
			text-decoration: none;
			transition:
				border-color 0.2s,
				background 0.2s;
		}
		.loading-btn:hover {
			background: #2a2a2a;
			border-color: #b4c4f0;
			color: #b4c4f0;
		}
	</style>
</head>

<body onload="load()" onmousemove="updateMouse(event)">
	<div id="loadingScreen">
		<img src="resources/coolboris.png" alt="Logo" id="loadingLogo" />
		<h1>The Galactic Tree</h1>
		<div class="spinner"></div>
		<div class="loading-buttons">
			<a
				class="loading-btn"
				href="https://discord.gg/Rs5cKF75WB"
				target="_blank"
				>CoolBoris Studio</a
			>
			<button class="loading-btn" onclick="exportSave()">Export Save</button>
		</div>
	</div>

	<div id="app">
		<canvas
			id="treeCanvas"
			class="canvas"
			v-if="!(tmp.gameEnded && !player.keepGoing)"
		></canvas>

		<div v-if="false" id="loadingSection" class="fullWidth">
			<h1>Loading The Galactic Tree</h1>
		</div>
		<div
			class="vl"
			v-if="player.navTab !== 'none' && tmp.other.splitScreen && player.tab!='none' && !(tmp.gameEnded && !player.keepGoing)"
		></div>
		<div
			v-if="(tmp.gameEnded && !player.keepGoing)"
			class="fullWidth"
			style="
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				font-family: monospace;
				background: #0a0a0a;
				color: white;
			"
		>
			<img
				src="resources/coolboris.png"
				alt="Logo"
				style="width: 200px; height: 200px; border-radius: 5%"
			/>

			<h2
				v-html="modInfo.winText"
				style="font-size: 1em; text-align: center; line-height: 1.6; margin: 0"
			></h2>

			<h3 v-if="!player.timePlayedReset" style="opacity: 0.5; font-size: 0.9em">
				Completed in {{formatTime(player.timePlayed)}}
			</h3>

			<div class="loading-buttons">
				<button class="loading-btn" onclick="hardReset(true)">
					Play Again
				</button>
				<button class="loading-btn" onclick="keepGoing()">Keep Going</button>
			</div>
			<div class="loading-buttons">
				<a
					class="loading-btn"
					v-if="modInfo.discordLink"
					v-bind:href="modInfo.discordLink"
					target="_blank"
					>{{modInfo.discordName}}</a
				>
			</div>
		</div>

		<div class="popup-container" v-if="options.forceOneTab">
			<transition-group name="fade">
				<div
					v-for="popup,index in activePopups"
					class="popup"
					v-bind:class="popup.type"
					v-bind:key="'ps' + popup.id"
					v-on:click="() => {activePopups.splice(index, 1)}"
					v-bind:style="popup.color ? {'background-color': popup.color} : {}"
				>
					<h3>{{popup.title}}</h3>
					<br />
					<h2 v-html="popup.message"></h2>
				</div>
			</transition-group>
		</div>

		<div
			id="treeOverlay"
			v-if="!(tmp.gameEnded && !player.keepGoing) && (player.tab === 'none' || tmp.other.splitScreen || !readData(layoutInfo.showTree))"
			class="treeOverlay"
			onscroll="resizeCanvas()"
			v-bind:class="{ 
			fullWidth: (player.tab == 'none' || player.navTab == 'none'), 
			col: (player.tab !== 'none' && player.navTab !== 'none'), 
			left: (player.tab !== 'none' && player.navTab !== 'none')}"
			:style="{'margin-top': !readData(layoutInfo.showTree) && player.tab == 'info-tab' ? '50px' : ''}"
		>
			<div class="popup-container" v-if="!options.forceOneTab">
				<transition-group name="fade">
					<div
						v-for="popup,index in activePopups"
						class="popup"
						v-bind:class="popup.type"
						v-bind:key="'p' + popup.id"
						v-on:click="() => {activePopups.splice(index, 1)}"
						v-bind:style="popup.color ? {'background-color': popup.color} : {}"
					>
						<h3>{{popup.title}}</h3>
						<br />
						<h2 v-html="popup.message"></h2>
					</div>
				</transition-group>
			</div>

			<div
				id="version"
				onclick="showTab('changelog-tab')"
				class="overlayThing"
				style="margin-right: 13px"
			>
				{{VERSION.withoutName}}
			</div>

			<button
				v-if="((player.navTab == 'none' && tmp[player.tab] && (tmp[player.tab].row == 'side' || tmp[player.tab].row == 'otherside' || player[player.tab].prevTab)) || player[player.navTab]?.prevTab)"
				class="other-back overlayThing"
				onclick="goBack(player.navTab == 'none' ? player.tab : player.navTab)"
			>
				←
			</button>

			<div id="overlayIcons" class="overlayThing">
				<div id="optionWheel">
					<img
						src="resources/options_wheel.png"
						onclick="showTab('options-tab')"
						alt="Options"
					/>
				</div>
				<div id="discord">
					<img
						src="resources/discord.png"
						onclick="
							window.open(
								modInfo.discordLink || 'https://discord.gg/F3xveHV',
								'mywindow',
							)
						"
						alt="Discord"
					/>
				</div>
				<div id="info" onclick="showTab('info-tab')" aria-label="Info">i</div>
			</div>

			<overlay-head v-if="!(tmp.gameEnded && !player.keepGoing)"></overlay-head>
			<div class="sideLayers">
				<div v-for="(node, index) in OTHER_LAYERS['side']">
					<tree-node
						:layer="node"
						:abb="tmp[node].symbol"
						:size="'small'"
						:key="'side' + index"
					></tree-node>
				</div>
			</div>
		</div>

		<div
			v-if="!(tmp.gameEnded && !player.keepGoing) && (player.tab === 'none' || tmp.other.splitScreen)"
			id="treeTab"
			onscroll="resizeCanvas()"
			v-bind:class="{ fullWidth: (player.tab == 'none' || player.navTab == 'none'), col: (player.tab !== 'none' && player.navTab !== 'none'), left: (player.tab !== 'none' && player.navTab !== 'none')}"
		>
			<br /><br /><br /><br />
			<overlay-head id="fakeHead" style="visibility: hidden"> </overlay-head>
			<layer-tab
				v-if="(player.navTab == 'none' ? player.tab : player.navTab) !== 'none'"
				:layer="player.navTab == 'none' ? player.tab : player.navTab"
				:key="'left'"
			></layer-tab>
			<bg
				v-if="(player.navTab == 'none' ? player.tab : player.navTab) !== 'none'"
				:layer="player.navTab == 'none' ? player.tab : player.navTab"
			></bg>
		</div>

		<div class="particle-container">
			<div v-for="particle,index in particles">
				<particle
					:data="particle"
					:index="index"
					v-bind:key="'b' + particle.id"
				></particle>
			</div>
		</div>

		<div
			v-if="player.navTab !== 'none' && player.tab !== 'none' && !(tmp.gameEnded && !player.keepGoing)"
			onscroll="resizeCanvas()"
			v-bind:class="{ fullWidth: player.navTab == 'none' || !tmp.other.splitScreen || !readData(layoutInfo.showTree), col: player.navTab != 'none', right: player.navTab != 'none', fast: true, tab: true}"
		>
			<div v-for="layer in LAYERS">
				<div v-if="player.tab==layer">
					<layer-tab
						:layer="layer"
						:back="'none'"
						:spacing="'50px'"
						:key="'left'"
					></layer-tab>
				</div>
			</div>
			<bg v-if="player.tab !== 'none'" :layer="player.tab"></bg>
		</div>
		<div class="bg2" v-bind:style="tmp.backgroundStyle"></div>
	</div>
</body>
